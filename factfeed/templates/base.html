<!doctype html>
<html lang="{{ locale or 'en' }}">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>{% block title %}{{ _('The Sorter') }}{% endblock %}</title>
        <link rel="stylesheet" href="/static/style.css" />
        <script src="/static/htmx.min.js"></script>
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;800&family=Merriweather:ital,wght@0,300;0,400;0,700;1,400&display=swap"
            rel="stylesheet"
        />
        <script>
            (function () {
                const savedTheme = localStorage.getItem("theme");
                const prefersDark = window.matchMedia(
                    "(prefers-color-scheme: dark)",
                ).matches;
                if (savedTheme) {
                    document.documentElement.setAttribute(
                        "data-theme",
                        savedTheme,
                    );
                } else if (prefersDark) {
                    document.documentElement.setAttribute("data-theme", "dark");
                }
            })();
        </script>
    </head>
    <body>
        <header>
            <a href="/" class="logo">{{ _('The Sorter') }}</a>
            <button
                class="hamburger"
                onclick="toggleMenu()"
                aria-label="Toggle menu"
            >
                <span></span>
                <span></span>
                <span></span>
            </button>
            <nav class="nav-links" id="nav-links">
                <a href="/">{{ _('Search') }}</a>
                <a href="/analytics">{{ _('Analytics') }}</a>
                <a href="/system/manage">{{ _('Storage') }}</a>
                <a href="/docs">{{ _('API Docs') }}</a>

                <div
                    id="system-monitor-container"
                    hx-get="/system/widget"
                    hx-trigger="load"
                    hx-swap="outerHTML"
                ></div>

                <div class="lang-switcher">
                    <button
                        onclick="setLang('en')"
                        class="{% if locale == 'en' %}active{% endif %}"
                    >
                        EN
                    </button>
                    <span class="sep">|</span>
                    <button
                        onclick="setLang('ru')"
                        class="{% if locale == 'ru' %}active{% endif %}"
                    >
                        RU
                    </button>
                </div>
                <button
                    class="theme-switcher"
                    onclick="toggleTheme()"
                    aria-label="Toggle theme"
                >
                    <svg class="theme-icon theme-icon-sun" viewBox="0 0 24 24">
                        <circle cx="12" cy="12" r="5"></circle>
                        <line x1="12" y1="1" x2="12" y2="3"></line>
                        <line x1="12" y1="21" x2="12" y2="23"></line>
                        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                        <line
                            x1="18.36"
                            y1="18.36"
                            x2="19.78"
                            y2="19.78"
                        ></line>
                        <line x1="1" y1="12" x2="3" y2="12"></line>
                        <line x1="21" y1="12" x2="23" y2="12"></line>
                        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
                        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
                    </svg>
                    <svg class="theme-icon theme-icon-moon" viewBox="0 0 24 24">
                        <path
                            d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"
                        ></path>
                    </svg>
                </button>
            </nav>
        </header>

        <main>{% block content %}{% endblock %}</main>

        <footer>
            <p>
                &copy; 2026 {{ _('The Sorter') }} &mdash; {{ _('Distinguishing
                facts from opinions.') }}
                <br />
                <a href="/docs">{{ _('API Documentation') }}</a>
            </p>
        </footer>
        <script>
            function setLang(lang) {
                const url = new URL(window.location.href);
                url.searchParams.set("lang", lang);
                window.location.href = url.toString();
            }

            function toggleTheme() {
                const current =
                    document.documentElement.getAttribute("data-theme");
                const target = current === "dark" ? "light" : "dark";
                document.documentElement.setAttribute("data-theme", target);
                localStorage.setItem("theme", target);
            }

            function toggleMenu() {
                const nav = document.getElementById("nav-links");
                nav.classList.toggle("active");
            }

            // Close hamburger menu on outside click
            document.addEventListener("click", function (e) {
                const nav = document.getElementById("nav-links");
                const hamburger = document.querySelector(".hamburger");
                if (nav.classList.contains("active") &&
                    !nav.contains(e.target) &&
                    !hamburger.contains(e.target)) {
                    nav.classList.remove("active");
                }
            });

            // Global HTMX error handling
            document.addEventListener("htmx:responseError", function (e) {
                console.error("HTMX error:", e.detail.xhr.status, e.detail.xhr.statusText);
                const toast = document.createElement("div");
                toast.className = "htmx-error-toast";
                toast.textContent = e.detail.xhr.status === 429
                    ? "{{ _('Too many requests. Please wait a moment.') }}"
                    : "{{ _('Something went wrong. Please try again.') }}";
                document.body.appendChild(toast);
                setTimeout(() => toast.remove(), 4000);
            });
            document.addEventListener("htmx:sendError", function () {
                const toast = document.createElement("div");
                toast.className = "htmx-error-toast";
                toast.textContent = "{{ _('Connection lost. Check your network.') }}";
                document.body.appendChild(toast);
                setTimeout(() => toast.remove(), 4000);
            });
        </script>
    </body>
</html>
