<!doctype html>
<html lang="{{ locale or 'en' }}">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>{% block title %}{{ _('FactFeed') }}{% endblock %}</title>
        <link rel="stylesheet" href="/static/style.css" />
        <script src="/static/htmx.min.js"></script>
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;800&family=Merriweather:ital,wght@0,300;0,400;0,700;1,400&display=swap"
            rel="stylesheet"
        />
    </head>
    <body>
        <header>
            <a href="/" class="logo">{{ _('FactFeed') }}</a>
            <nav class="nav-links">
                <a href="/">{{ _('Search') }}</a>
                <a href="/docs">{{ _('API Docs') }}</a>
                <div class="lang-switcher">
                    <button
                        onclick="setLang('en')"
                        class="{% if locale == 'en' %}active{% endif %}"
                    >
                        EN
                    </button>
                    <span class="sep">|</span>
                    <button
                        onclick="setLang('ru')"
                        class="{% if locale == 'ru' %}active{% endif %}"
                    >
                        RU
                    </button>
                </div>
            </nav>
        </header>

        <main>{% block content %}{% endblock %}</main>

        <footer>
            <p>
                &copy; 2026 {{ _('FactFeed') }} &mdash; {{ _('Distinguishing
                facts from opinions.') }}
                <br />
                <a href="/docs">{{ _('API Documentation') }}</a>
            </p>
        </footer>
        <script>
            function setLang(lang) {
                const url = new URL(window.location.href);
                url.searchParams.set("lang", lang);
                window.location.href = url.toString();
            }
        </script>
    </body>
</html>
