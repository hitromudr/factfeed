services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-factfeed}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-factfeed}
      POSTGRES_DB: ${POSTGRES_DB:-factfeed}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-factfeed} -d ${POSTGRES_DB:-factfeed}",
        ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  migrate:
    build: .
    command: ["uv", "run", "alembic", "upgrade", "head"]
    volumes:
      - ./factfeed:/app/factfeed
      - ./alembic:/app/alembic
      - ./alembic.ini:/app/alembic.ini
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-factfeed}:${POSTGRES_PASSWORD:-factfeed}@postgres:5432/${POSTGRES_DB:-factfeed}
    env_file:
      - path: .env
        required: false
    depends_on:
      postgres:
        condition: service_healthy
    restart: on-failure

  app:
    build: .
    command:
      [
        "uv",
        "run",
        "uvicorn",
        "factfeed.web.main:app",
        "--host",
        "0.0.0.0",
        "--port",
        "8002",
        "--reload",
      ]
    volumes:
      - ./factfeed:/app/factfeed
      - ./alembic:/app/alembic
      - ./alembic.ini:/app/alembic.ini
    # Use host networking so we can access localhost proxies directly
    network_mode: "host"
    environment:
      # With network_mode: host, "postgres" hostname won't resolve. Use localhost.
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-factfeed}:${POSTGRES_PASSWORD:-factfeed}@localhost:5433/${POSTGRES_DB:-factfeed}
    env_file:
      - path: .env
        required: false
    ports:
      - "8001:8000"
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

volumes:
  postgres_data:
